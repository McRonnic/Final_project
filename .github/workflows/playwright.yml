test:
    needs: lint
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for Allure history
          
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
            
      - name: Install dependencies
        run: npm ci
          
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
          
      - name: Run Playwright tests
        run: npx playwright test
          
      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        if: always()
        with:
          distribution: 'temurin'
          java-version: '17'
  
      - name: Install Allure
        if: always()
        run: npm install -g allure-commandline
  
      - name: Checkout gh-pages branch for history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          
      - name: Copy previous Allure history
        if: always()
        continue-on-error: true
        run: |
          mkdir -p ./allure-results/history
          cp -r gh-pages/${{ github.run_number }}/history/* ./allure-results/history || cp -r gh-pages/history/* ./allure-results/history || true
  
      - name: Generate Allure Report
        if: always()
        run: npx allure generate ./allure-results --clean -o allure-report
  
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          destination_dir: ${{ github.run_number }} # Раскладываем отчеты по папкам-номерам ранов

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ./playwright-report
          retention-days: 10

      - name: Send Telegram Notification
        if: always() 
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_USER_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          debug: true # Поможет увидеть ошибку в логах GitHub, если Telegram не примет запрос
          message: |
            *Статус прогона тестов:* ${{ job.status == 'success' && '✅ Успешно' || '❌ Падение' }}
            
            *Репозиторий:* ${{ github.repository }}
            *Ветка:* `${{ github.ref_name }}`
            
            🌐 [Посмотреть Allure-отчет](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.run_number }})